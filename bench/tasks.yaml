version: 1
generated_from:
  - README.md
  - docs/testing/browser-agent-automation.md
  - docs/testing/funnels/comet-transcript-funnels.md
  - docs/testing/observation-only-targets.md
  - scripts/run-qa-smoke.mjs
  - scripts/live-local-browser-course.mjs
  - scripts/live-gemini-browser-course.mjs
  - tests/playwright/funnels/comet-transcript-funnels.spec.ts
  - tests/playwright/funnels/panel-image-attachments.spec.ts
  - tests/playwright/funnels/panel-stop-state.spec.ts

coverage_states:
  active: Repo-backed task with executable evidence requirements.
  planned_observation_only: Canonical read-only task. No write, submit, or settings mutation actions allowed.

evidence_levels:
  visible-ui-only: Visible page load and read-only summary with no unsafe action taken.
  visible-ui-plus-artifact: Visible result plus a saved artifact such as report.json or screenshot.
  visible-ui-plus-dom-eval: Visible flow plus validated DOM end state.
  visible-ui-plus-rpc-payload: Visible flow plus matching RPC or structured payload evidence.

tasks:
  - id: panel-screenshot-smoke
    site_id: assistant-panel
    name: Capture visible-tab screenshot from the panel
    start_url: chrome-extension://<resolved-extension-id>/panel.html
    goal: Use the plus menu to capture the current HTTP or HTTPS tab as a screenshot attachment.
    expected_outcome: >
      With a real web page open, clicking plus then Screenshot attaches a screenshot-named chip,
      shows no error toast, and writes output/playwright/qa-smoke/report.json plus panel-final.png.
    evidence_level: visible-ui-plus-artifact
    priority: P0
    likely_failure_classes:
      - runtime-failure
      - perception-failure
      - validation-failure
      - timeout
    notes: >
      Canonical smoke gate. scripts/run-qa-smoke.mjs currently uses https://example.com as
      the companion page because captureVisibleTab needs a real http or https tab.

  - id: panel-screenshot-agentrun
    site_id: assistant-panel
    name: Submit screenshot attachment as image input
    start_url: chrome-extension://<resolved-extension-id>/panel.html
    goal: Capture a screenshot, send a prompt, and verify the panel forwards image data to AgentRun.
    expected_outcome: >
      A screenshot attachment chip is visible before send, and the first AgentRun payload has
      has_image_input=true with at least one data:image/png;base64 payload.
    evidence_level: visible-ui-plus-rpc-payload
    priority: P1
    likely_failure_classes:
      - runtime-failure
      - transport-sync-failure
      - validation-failure
    notes: >
      Backed by tests/playwright/funnels/panel-image-attachments.spec.ts with a local fixture page
      and stub sidecar.

  - id: panel-history-followup
    site_id: assistant-panel
    name: Preserve chat history across follow-up runs
    start_url: chrome-extension://<resolved-extension-id>/panel.html
    goal: Send one prompt, receive a response, then send a follow-up and verify prior turns are forwarded.
    expected_outcome: >
      The second AgentRun payload contains history_messages with the prior user prompt and the
      prior assistant answer in order.
    evidence_level: visible-ui-plus-rpc-payload
    priority: P1
    likely_failure_classes:
      - runtime-failure
      - transport-sync-failure
      - validation-failure
      - premature-completion
    notes: >
      Backed by the second panel-image-attachments funnel. This is panel-state continuity, not
      browser-control correctness.

  - id: panel-stop-run
    site_id: assistant-panel
    name: Stop an in-flight run from the send button
    start_url: chrome-extension://<resolved-extension-id>/panel.html
    goal: Start a run, click Send again while stop-mode is active, and verify the run stops cleanly.
    expected_outcome: >
      The stop-mode button appears during the run, a stop request is sent, the button returns to
      idle, and the last assistant message contains "Stopped" without showing "No response".
    evidence_level: visible-ui-plus-artifact
    priority: P0
    likely_failure_classes:
      - recovery-failure
      - transport-sync-failure
      - validation-failure
    notes: >
      Backed by tests/playwright/funnels/panel-stop-state.spec.ts. This is the canonical stop-control
      task for the panel.

  - id: panel-pause-resume
    site_id: assistant-panel
    name: Pause from takeover overlay and resume the same run
    start_url: chrome-extension://<resolved-extension-id>/panel.html
    goal: Let the overlay take control, pause the run, then resume it from the panel.
    expected_outcome: >
      The overlay status transitions through Pausing to Paused, the Resume button becomes visible,
      AgentResume is sent, only one AgentRun exists for the flow, and the assistant reports
      "Resumed after manual takeover".
    evidence_level: visible-ui-plus-rpc-payload
    priority: P0
    likely_failure_classes:
      - recovery-failure
      - transport-sync-failure
      - validation-failure
      - timeout
    notes: >
      Uses the local /fixture page exposed by the stop-state test harness so the overlay can be
      exercised against a real page.

  - id: panel-navigation-idle
    site_id: assistant-panel
    name: Complete a simple navigation run and return to idle
    start_url: chrome-extension://<resolved-extension-id>/panel.html
    goal: Run a simple navigation task and verify the panel leaves stop-mode when the task completes.
    expected_outcome: >
      The assistant visibly returns a completion message, the stop-mode button disappears, and the
      panel is back in its idle send state.
    evidence_level: visible-ui-plus-artifact
    priority: P1
    likely_failure_classes:
      - runtime-failure
      - premature-completion
      - validation-failure
    notes: >
      The current stub-backed completion text is "Opened Wikipedia." in panel-stop-state.spec.ts.

  - id: panel-interrupted-neutral
    site_id: assistant-panel
    name: Render interrupted runs as neutral interruptions
    start_url: chrome-extension://<resolved-extension-id>/panel.html
    goal: Verify an interrupted run is shown as a neutral interruption rather than a fatal panel error.
    expected_outcome: >
      The last assistant message contains "interrupted before it finished" and no .gamma-error slab
      is rendered in the panel.
    evidence_level: visible-ui-plus-artifact
    priority: P1
    likely_failure_classes:
      - recovery-failure
      - validation-failure
      - runtime-failure
    notes: >
      Backed by the interrupted scenario in tests/playwright/funnels/panel-stop-state.spec.ts.

