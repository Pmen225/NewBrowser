version: 1
generated_from:
  - README.md
  - docs/testing/browser-agent-automation.md
  - docs/testing/funnels/comet-transcript-funnels.md
  - docs/testing/observation-only-targets.md
  - scripts/run-qa-smoke.mjs
  - scripts/live-local-browser-course.mjs
  - scripts/live-gemini-browser-course.mjs
  - tests/playwright/funnels/panel-image-attachments.spec.ts
  - tests/playwright/funnels/panel-stop-state.spec.ts

coverage_states:
  active: Repo-backed coverage with executable tasks and evidence expectations.
  planned_observation_only: Canonical awareness target; agents may only open, navigate, read, summarize, and locate controls.

sites:
  - id: assistant-panel
    name: Assistant Panel
    base_url: chrome-extension://<resolved-extension-id>/panel.html
    coverage_state: active
    interaction_mode: mixed_safe_runtime
    priority: P0
    auth_required: false
    notes: >
      Canonical product surface for smoke, attachment, history, stop, pause/resume,
      idle-return, and interruption handling. Some tasks require a companion HTTP page
      or local fixture server; those details live on each task.
    task_ids:
      - panel-screenshot-smoke
      - panel-screenshot-agentrun
      - panel-history-followup
      - panel-stop-run
      - panel-pause-resume
      - panel-navigation-idle
      - panel-interrupted-neutral

  - id: local-browser-course
    name: Local Browser Course
    base_url: http://127.0.0.1:<ephemeral>
    coverage_state: active
    interaction_mode: benchmark_runtime
    priority: P0
    auth_required: false
    notes: >
      Repo-native browser-control crash course served by scripts/lib/local-browser-course.js.
      The port is assigned at runtime. This is the cleanest benchmark surface because it
      removes third-party drift while preserving real browser interactions.
    task_ids:
      - local-course-checkboxes
      - local-course-dropdown
      - local-course-dynamic-controls
      - local-course-javascript-prompt
      - local-course-inputs
      - local-course-file-upload

  - id: the-internet-browser-course
    name: The Internet Browser Course
    base_url: https://the-internet.herokuapp.com
    coverage_state: active
    interaction_mode: benchmark_runtime
    priority: P1
    auth_required: false
    notes: >
      Public benchmark target still used by the live Google browser-control benchmark
      and model approval flow. Task coverage mirrors the local browser course but runs
      against the public site in scripts/live-gemini-browser-course.mjs.
    task_ids:
      - heroku-course-checkboxes
      - heroku-course-dropdown
      - heroku-course-dynamic-controls
      - heroku-course-javascript-prompt
      - heroku-course-inputs
      - heroku-course-file-upload

  - id: comet-funnels-fixture
    name: Comet Transcript Fixtures
