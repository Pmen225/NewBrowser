<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="settings-app">
    <main class="settings-menu-shell">
      <aside class="settings-menu-sidebar" aria-label="Settings menu">
        <div class="settings-profile-head">Profile 1</div>

        <nav class="settings-menu-nav" aria-label="Settings sections">
          <a href="#provider" class="settings-menu-item settings-menu-item--active">General</a>
          <a href="#model" class="settings-menu-item">Web Browsing</a>
        </nav>

        <div class="settings-email">local@assistant.dev</div>

        <nav class="settings-menu-nav settings-menu-nav--secondary" aria-label="More settings sections">
          <a href="#audio" class="settings-menu-item">Personalization</a>
          <a href="#chats" class="settings-menu-item">Data Controls</a>
          <a href="#model" class="settings-menu-item">Agent Mode</a>
        </nav>

        <div class="settings-profile-foot">
          <div class="settings-avatar">P1</div>
          <div>
            <div class="settings-foot-title">Profile 1</div>
            <div class="settings-foot-subtitle">Local Assistant</div>
          </div>
        </div>
      </aside>

      <section class="settings-pane">
        <header class="settings-pane-header">
          <h1 class="settings-pane-title">General</h1>
          <div class="settings-badge-cluster" aria-hidden="true">
            <div class="settings-badge">111 days</div>
            <div class="settings-badge settings-badge--center">P1</div>
            <div class="settings-badge">108 days</div>
          </div>
        </header>

        <section id="provider" class="settings-section" aria-label="Provider keys">
          <div class="settings-banner-row">
            <div>Assistant is not your default browser</div>
            <button id="provider-save-btn" class="settings-chip-button settings-chip-button--primary" type="button">Save key</button>
          </div>
          <h2 class="settings-section-title">AI Provider</h2>
          <div class="settings-group-card">
            <label class="settings-menu-row settings-menu-row--stacked">
              <span class="settings-menu-row-label">Provider</span>
              <input id="provider-id-input" class="settings-input" type="text" placeholder="google" autocomplete="off" />
            </label>
            <label class="settings-menu-row settings-menu-row--stacked">
              <span class="settings-menu-row-label">API key</span>
              <input id="provider-key-input" class="settings-input" type="password" placeholder="AIza..." autocomplete="new-password" />
            </label>
            <label class="settings-menu-row settings-menu-row--stacked">
              <span class="settings-menu-row-label">Preferred model</span>
              <input id="provider-model-input" class="settings-input" type="text" placeholder="models/gemini-2.5-flash" autocomplete="off" />
            </label>
            <label class="settings-menu-row settings-menu-row--stacked">
              <span class="settings-menu-row-label">Base URL</span>
              <input id="provider-base-url-input" class="settings-input" type="url" placeholder="https://api.example.com" autocomplete="off" />
            </label>
          </div>
          <div id="provider-save-status" class="settings-hint" role="status" aria-live="polite" hidden></div>
          <div id="provider-list" class="settings-list" aria-live="polite"></div>
        </section>

        <section id="model" class="settings-section" aria-label="Model settings">
          <div class="settings-section-header-row">
            <h2 class="settings-section-title">Web Browsing</h2>
            <button id="model-config-save-btn" class="settings-chip-button settings-chip-button--primary" type="button">Save</button>
          </div>
          <div class="settings-group-card">
            <label class="settings-menu-row">
              <span class="settings-menu-row-label">Selection mode</span>
              <select id="model-mode-select" class="settings-select">
                <option value="auto">Auto</option>
                <option value="manual">Manual</option>
              </select>
            </label>
            <label class="settings-menu-row">
              <span class="settings-menu-row-label">Thinking level</span>
              <select id="thinking-level-select" class="settings-select">
                <option value="minimal">Minimal</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </label>
            <label class="settings-menu-row settings-menu-row--toggle">
              <span class="settings-menu-row-label">Function calling</span>
              <input id="function-calling-toggle" class="settings-toggle" type="checkbox" checked />
            </label>
            <label class="settings-menu-row settings-menu-row--toggle">
              <span class="settings-menu-row-label">Web search</span>
              <input id="browser-search-toggle" class="settings-toggle" type="checkbox" checked />
            </label>
            <label class="settings-menu-row settings-menu-row--toggle">
              <span class="settings-menu-row-label">Code execution</span>
              <input id="code-execution-toggle" class="settings-toggle" type="checkbox" checked />
            </label>
          </div>
          <div id="model-config-status" class="settings-hint" role="status" aria-live="polite" hidden></div>
        </section>

        <section id="audio" class="settings-section" aria-label="Audio">
          <h2 class="settings-section-title">Personalization</h2>
          <div class="settings-group-card">
            <label class="settings-menu-row settings-menu-row--toggle">
              <span class="settings-menu-row-label">Narration</span>
              <input id="narration-toggle" class="settings-toggle" type="checkbox" />
            </label>
            <label class="settings-menu-row settings-menu-row--toggle">
              <span class="settings-menu-row-label">Dictation</span>
              <input id="transcription-toggle" class="settings-toggle" type="checkbox" />
            </label>
          </div>
          <div id="audio-support" class="settings-hint" role="status" aria-live="polite"></div>
        </section>

        <section id="chats" class="settings-section" aria-label="Chats">
          <div class="settings-section-header-row">
            <h2 class="settings-section-title">Data Controls</h2>
            <button id="clear-chats-btn" class="settings-chip-button" type="button">Clear all</button>
          </div>
          <div id="chat-list" class="settings-list"></div>
        </section>
      </section>
    </main>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
